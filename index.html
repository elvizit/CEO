    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #afacac;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(3, 54, 7, 0.616);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .header-bg {
            background: linear-gradient(135deg, #e0e0e0 0%, #ffffff 100%);
            height: 120px;
            position: relative;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background-color: #bdbdbd;
            border-radius: 50%;
            border: 5px solid white;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar svg {
            width: 60px;
            fill: white;
        }

        .content {
            padding: 60px 20px 30px;
        }

        h1 {
            font-size: 22px;
            color: #d1d1d1;
            margin-bottom: 25px;
        }

        .save-btn {
            background-color: #000000;
            color: rgb(255, 255, 255);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
            transition: background-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        }

        .save-btn:hover {
            background-color: #1e88e5;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(30, 136, 229, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .grid-item {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: background-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        }

        .grid-item:hover {
            background: #f9f9f9;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        }

        .grid a:nth-child(1):hover {
            background: #1e88e5;
            color: #ffffff;
        }

        .grid a:nth-child(2):hover {
            background: #43a047;
            color: #ffffff;
        }

        .icon {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .full-width-btn {
            display: block;
            background: #f8f9fa;
            border: 1px solid #eee;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: background-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        }

        .full-width-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        }

        .tg-primary { border-left: 5px solid #0088cc; }
        .insta { border-left: 5px solid #e1306c; }
        .wa { border-left: 5px solid #25d366; }

        .tg-primary:hover {
            background: #0088cc;
            color: #ffffff;
        }

        .insta:hover {
            background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af);
            color: #ffffff;
        }

        .wa:hover {
            background: #25d366;
            color: #ffffff;
        }

    .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}
